<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onpoint Group - Project Manager Performance Tracker</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Moment.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <!-- jsPDF for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #1e4b8c 0%, #0a2f5a 100%); }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .connection-status {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .status-connected { background-color: #10b981; animation: pulse 2s infinite; }
        .status-disconnected { background-color: #ef4444; }
        .status-checking { background-color: #f59e0b; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .btn-blue {
            background: linear-gradient(135deg, #1e4b8c 0%, #0a2f5a 100%);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .btn-blue:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(30, 75, 140, 0.4);
        }
        .btn-outline-blue {
            border: 2px solid #1e4b8c;
            color: #1e4b8c;
            background: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .btn-outline-blue:hover {
            background: #1e4b8c;
            color: white;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            max-width: 350px;
        }
        .toast.show { transform: translateX(0); }
        .toast.success { background-color: #10b981; }
        .toast.error { background-color: #ef4444; }
        .toast.info { background-color: #3b82f6; }
        #debugConsole {
            background: #1a1a1a;
            color: #00ff00;
            font-family: monospace;
            padding: 10px;
            border-radius: 5px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="gradient-bg text-white shadow-lg">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="logo-container">
                    <span class="text-2xl font-bold">Onpoint Group</span>
                </div>
                <div class="flex items-center space-x-6">
                    <div class="flex items-center cursor-pointer" onclick="checkConnection()" title="Click to test connection">
                        <span id="connectionStatus" class="connection-status status-checking"></span>
                        <span id="connectionText" class="text-sm opacity-75">Checking connection...</span>
                    </div>
                    <span class="text-sm opacity-75">Project Manager Performance Tracker</span>
                    <div class="h-8 w-8 bg-white rounded-full flex items-center justify-center">
                        <i class="fa-regular fa-user text-[#1e4b8c]"></i>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <div class="container mx-auto px-6 py-8">
        <!-- Debug Console (Temporary - Remove after fixing) -->
        <div class="mb-4 p-4 bg-gray-800 text-white rounded-lg">
            <div class="flex justify-between items-center mb-2">
                <h3 class="font-bold">Debug Console</h3>
                <button onclick="clearDebug()" class="text-xs bg-gray-600 px-2 py-1 rounded">Clear</button>
            </div>
            <div id="debugConsole" class="text-xs">
                Ready to connect...
            </div>
        </div>

        <!-- Connection Alert -->
        <div id="connectionAlert" class="hidden mb-6 p-4 bg-red-50 border border-red-200 rounded-lg">
            <div class="flex items-center gap-3 text-red-700">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <div>
                    <p class="font-semibold">Connection Error</p>
                    <p id="connectionErrorMessage" class="text-sm">Unable to connect to Google Sheets.</p>
                </div>
                <button onclick="checkConnection()" class="ml-auto px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 text-sm">
                    Retry
                </button>
            </div>
        </div>

        <!-- Rest of your HTML remains the same (Project Manager Selection, Project Setup, etc.) -->
        <!-- ... (keep all your existing HTML content here) ... -->
        
        <!-- For brevity, I'm showing only the script section, but keep all your HTML structure -->
    </div>

    <script>
        // ============================================
        // CONFIGURATION - UPDATE THESE VALUES
        // ============================================
        const SHEET_ID = '18IcEjJHQS6Wmqri4lfEBLc47b3piQ8tOcF3aR5tZh6U';
        const SHEET_NAME = 'Managers';
        const DRIVE_FOLDER_ID = '1al8guXtgk-PJWwdNvd2umUXYv4AvwXSM';
        
        // IMPORTANT: REPLACE THIS WITH YOUR ACTUAL DEPLOYED WEB APP URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwzq2ufyvByTPa19mEymyQto-tl7NGKwaZtyS04HRWlDzWvhYC3QQR08ctorKhG4H6W/exec; // <-- CHANGE THIS!
        
        // ============================================
        // DEBUGGING FUNCTIONS
        // ============================================
        function debugLog(message, data = null) {
            const console = document.getElementById('debugConsole');
            const timestamp = new Date().toLocaleTimeString();
            let logMessage = `[${timestamp}] ${message}`;
            if (data) {
                logMessage += `\n${JSON.stringify(data, null, 2)}`;
            }
            console.innerHTML += `<div>${logMessage}</div>`;
            console.scrollTop = console.scrollHeight;
            console.log(message, data);
        }

        function clearDebug() {
            document.getElementById('debugConsole').innerHTML = '';
        }

        // ============================================
        // CONNECTION HANDLING WITH DEBUGGING
        // ============================================
        
        async function checkConnection() {
            const statusDot = document.getElementById('connectionStatus');
            const statusText = document.getElementById('connectionText');
            const alertBox = document.getElementById('connectionAlert');
            const errorMessage = document.getElementById('connectionErrorMessage');
            
            statusDot.className = 'connection-status status-checking';
            statusText.textContent = 'Checking connection...';
            alertBox.classList.add('hidden');
            
            debugLog('Starting connection check...');
            debugLog('SCRIPT_URL:', SCRIPT_URL);
            debugLog('SHEET_ID:', SHEET_ID);
            debugLog('SHEET_NAME:', SHEET_NAME);
            
            if (SCRIPT_URL === 'YOUR_DEPLOYED_SCRIPT_URL_HERE') {
                errorMessage.textContent = 'Please update SCRIPT_URL in the HTML with your deployed Web App URL';
                statusDot.className = 'connection-status status-disconnected';
                statusText.textContent = 'Configuration Error';
                alertBox.classList.remove('hidden');
                debugLog('ERROR: SCRIPT_URL not configured');
                return;
            }
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000);
                
                const requestBody = {
                    action: 'test',
                    sheetId: SHEET_ID,
                    sheetName: SHEET_NAME,
                    driveFolderId: DRIVE_FOLDER_ID
                };
                
                debugLog('Sending request:', requestBody);
                
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(requestBody),
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                debugLog('Response status:', response.status);
                debugLog('Response headers:', [...response.headers.entries()]);
                
                const responseText = await response.text();
                debugLog('Raw response:', responseText);
                
                let result;
                try {
                    result = JSON.parse(responseText);
                } catch (e) {
                    debugLog('JSON parse error:', e.message);
                    throw new Error('Invalid JSON response from server. Response was: ' + responseText.substring(0, 100));
                }
                
                if (result.success) {
                    statusDot.className = 'connection-status status-connected';
                    statusText.textContent = 'Connected to Google Sheets';
                    isConnected = true;
                    debugLog('Connection successful!', result);
                    showToast('Connected successfully!', 'success');
                    
                    // Load history if connected
                    loadHistoryFromServer();
                } else {
                    throw new Error(result.message || 'Connection test failed');
                }
                
            } catch (error) {
                debugLog('Connection error details:', {
                    name: error.name,
                    message: error.message,
                    stack: error.stack
                });
                
                statusDot.className = 'connection-status status-disconnected';
                statusText.textContent = 'Disconnected';
                isConnected = false;
                
                let userMessage = error.message;
                if (error.name === 'AbortError') {
                    userMessage = 'Request timeout - server not responding';
                } else if (error.message.includes('Failed to fetch')) {
                    userMessage = 'CORS error - check Web App deployment permissions';
                }
                
                errorMessage.textContent = userMessage;
                alertBox.classList.remove('hidden');
                showToast('Connection failed: ' + userMessage, 'error', 8000);
            }
        }

        // ============================================
        // TEST FUNCTION TO VERIFY SETUP
        // ============================================
        
        async function testDirectAccess() {
            debugLog('Testing direct access to Web App...');
            try {
                const response = await fetch(SCRIPT_URL + '?test=1');
                const text = await response.text();
                debugLog('Direct access response:', text);
            } catch (error) {
                debugLog('Direct access error:', error.message);
            }
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        
        document.addEventListener('DOMContentLoaded', function() {
            debugLog('Page loaded');
            
            // Set default dates
            document.getElementById('startDate').value = moment().format('YYYY-MM-DD');
            document.getElementById('endDate').value = moment().add(30, 'days').format('YYYY-MM-DD');
            
            // Load sample data
            loadSampleData();
            
            // Check connection after a short delay
            setTimeout(() => {
                checkConnection();
                testDirectAccess(); // Test direct access as well
            }, 2000);
            
            // Check connection every 30 seconds
            setInterval(checkConnection, 30000);
        });

        // Keep all your existing functions (calculateProjections, submitDailyPerformance, etc.)
        // ... (copy all your other functions here)
        
    </script>
</body>
</html>
